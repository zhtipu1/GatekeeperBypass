name: Build GatekeeperBypass

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Build (Release)
      run: |
        xcodebuild \
          -project GatekeeperBypass.xcodeproj \
          -scheme GatekeeperBypass \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Set app icon
      run: |
        mkdir -p build/Build/Products/Release/GatekeeperBypass.app/Contents/Resources
        cp icon/icon.icns build/Build/Products/Release/GatekeeperBypass.app/Contents/Resources/AppIcon.icns
        /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" build/Build/Products/Release/GatekeeperBypass.app/Contents/Info.plist || \
        /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" build/Build/Products/Release/GatekeeperBypass.app/Contents/Info.plist

    - name: Zip app
      run: |
        cd build/Build/Products/Release
        zip -r GatekeeperBypass.zip GatekeeperBypass.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GatekeeperBypass
        path: build/Build/Products/Release/GatekeeperBypass.zip

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/Build/Products/Release/GatekeeperBypass.zip
